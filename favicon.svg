<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="20%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="green" cx="70%" cy="80%" r="65%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="30%" cy="90%" r="65%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer rounded square background -->
  <rect width="32" height="32" rx="10" ry="10" fill="#020617"/>
  <rect width="32" height="32" rx="10" ry="10" fill="url(#bg)"/>
  <rect width="32" height="32" rx="10" ry="10" fill="url(#green)"/>
  <rect width="32" height="32" rx="10" ry="10" fill="url(#blue)"/>
  <rect width="32" height="32" rx="10" ry="10" fill="none" stroke="rgba(15,23,42,0.95)" stroke-width="1"/>

  <!-- Inner glyph card -->
  <rect x="6" y="6" width="20" height="20" rx="6" ry="6" fill="#020617"/>
  <rect x="6" y="6" width="20" height="20" rx="6" ry="6" fill="none" stroke="rgba(148,163,184,0.7)" stroke-width="0.75"/>

  <!-- Green glow behind inner card -->
  <rect x="6" y="6" width="20" height="20" rx="6" ry="6" fill="url(#glowGrad)" opacity="0.5" filter="url(#glow)"/>

  <!-- L glyph — top left -->
  <text x="8" y="18" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="10" fill="#bbf7d0" filter="url(#glow)">L</text>

  <!-- F glyph — bottom right -->
  <text x="17" y="26" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="10" fill="#22c55e" filter="url(#glow)">F</text>
</svg>
