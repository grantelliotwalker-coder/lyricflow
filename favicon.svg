<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="green" cx="70%" cy="80%" r="65%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="30%" cy="90%" r="65%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer rounded square -->
  <rect width="32" height="32" rx="8" ry="8" fill="#020617"/>
  <rect width="32" height="32" rx="8" ry="8" fill="url(#green)" opacity="0.6"/>
  <rect width="32" height="32" rx="8" ry="8" fill="url(#blue)" opacity="0.5"/>
  <rect width="32" height="32" rx="8" ry="8" fill="none" stroke="rgba(148,163,184,0.3)" stroke-width="1"/>

  <!-- Inner card -->
  <rect x="5" y="5" width="22" height="22" rx="5" ry="5" fill="#020617" opacity="0.9"/>
  <rect x="5" y="5" width="22" height="22" rx="5" ry="5" fill="none" stroke="rgba(148,163,184,0.5)" stroke-width="0.75"/>

  <!-- L — top left (vertical bar + horizontal bar) -->
  <rect x="8" y="8" width="2.5" height="9" rx="1" fill="#bbf7d0"/>
  <rect x="8" y="14.5" width="6" height="2.5" rx="1" fill="#bbf7d0"/>

  <!-- F — bottom right (vertical bar + two horizontal bars) -->
  <rect x="17.5" y="15" width="2.5" height="9" rx="1" fill="#22c55e"/>
  <rect x="17.5" y="15" width="6" height="2.5" rx="1" fill="#22c55e"/>
  <rect x="17.5" y="18.5" width="4.5" height="2" rx="1" fill="#22c55e"/>
</svg>
