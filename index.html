<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LyricFlow – Stage</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.app-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    background: #111;
    border-bottom: 1px solid #222;
}

.viewer-container {
    flex: 1;
    overflow: hidden;
    position: relative;
}

.viewer-content {
    position: absolute;
    width: 100%;
    padding: 40vh 60px;
    box-sizing: border-box;
    will-change: transform;
}

.viewer-content-line {
    display: block;
    font-size: 40px;
    line-height: 1.6;
    text-align: center;
    margin-bottom: 12px;
}

.controls {
    display: flex;
    gap: 10px;
}

button {
    background: #222;
    border: 1px solid #333;
    color: white;
    padding: 8px 14px;
    cursor: pointer;
}

button:hover {
    background: #333;
}

.hidden {
    display: none;
}

.playlist-pill {
    background: #1e1e1e;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="app-shell">

<header class="app-header">
    <div class="playlist-pill">
        <span id="playlistPillText"></span>
        <span id="playlistPillIndex"></span>
    </div>

    <div class="controls">
        <button id="prevSongBtn">⏮</button>
        <button id="start">▶</button>
        <button id="pause" class="hidden">⏸</button>
        <button id="resetBtn">⟳</button>
        <button id="nextSongBtn">⏭</button>
    </div>
</header>

<div class="viewer-container">
    <div id="viewerContent" class="viewer-content"></div>
</div>

</div>

<script>
const STORAGE_KEY = 'lyricflow_songs';
const CURRENT_KEY = 'lyricflow_currentSongId';

const qs = id => document.getElementById(id);

const viewerContent = qs('viewerContent');
const startBtn = qs('start');
const pauseBtn = qs('pause');
const resetBtn = qs('resetBtn');
const prevSongBtn = qs('prevSongBtn');
const nextSongBtn = qs('nextSongBtn');
const playlistPillText = qs('playlistPillText');
const playlistPillIndex = qs('playlistPillIndex');

let allSongs = [];
let playlistSongs = [];
let currentIndex = 0;

let isRunning = false;
let animationId = null;
let scrollPos = 0;
let scrollSpeed = 0.5;

let isDragging = false;
let dragStartY = 0;
let dragStartScroll = 0;

/* LOAD SONGS */

function loadSongs() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (!stored) return;

    allSongs = JSON.parse(stored);
    if (!Array.isArray(allSongs) || !allSongs.length) return;

    const currentId = localStorage.getItem(CURRENT_KEY);
    const currentSong = allSongs.find(s => s.id === currentId);

    if (!currentSong) return;

    playlistSongs = allSongs.filter(s => s.playlist === currentSong.playlist);

    currentIndex = playlistSongs.findIndex(s => s.id === currentId);
    if (currentIndex === -1) currentIndex = 0;

    renderSong();
}

function renderSong() {
    const song = playlistSongs[currentIndex];
    if (!song) return;

    viewerContent.innerHTML = song.content
        .split('\n')
        .map(line => `<span class="viewer-content-line">${line || '&nbsp;'}</span>`)
        .join('');

    playlistPillText.textContent = song.playlist;
    playlistPillIndex.textContent = ` ${currentIndex + 1}/${playlistSongs.length}`;

    scrollSpeed = song.scrollSpeed || 0.5;

    resetScroll(false);
}

/* SCROLL ENGINE */

function animate() {
    if (!isRunning) return;
    scrollPos += scrollSpeed;
    viewerContent.style.transform = `translateY(-${scrollPos}px)`;
    animationId = requestAnimationFrame(animate);
}

function startScroll() {
    if (isRunning) return;
    isRunning = true;
    startBtn.classList.add('hidden');
    pauseBtn.classList.remove('hidden');
    animate();
}

function pauseScroll() {
    isRunning = false;
    cancelAnimationFrame(animationId);
    startBtn.classList.remove('hidden');
    pauseBtn.classList.add('hidden');
}

function resetScroll(updateButtons = true) {
    isRunning = false;
    cancelAnimationFrame(animationId);
    scrollPos = 0;
    viewerContent.style.transform = 'translateY(0px)';
    if (updateButtons) {
        startBtn.classList.remove('hidden');
        pauseBtn.classList.add('hidden');
    }
}

/* NAVIGATION */

function nextSong() {
    if (!playlistSongs.length) return;
    currentIndex = (currentIndex + 1) % playlistSongs.length;
    localStorage.setItem(CURRENT_KEY, playlistSongs[currentIndex].id);
    renderSong();
}

function prevSong() {
    if (!playlistSongs.length) return;
    currentIndex = (currentIndex - 1 + playlistSongs.length) % playlistSongs.length;
    localStorage.setItem(CURRENT_KEY, playlistSongs[currentIndex].id);
    renderSong();
}

/* DRAG SCROLL */

viewerContent.addEventListener('mousedown', e => {
    isDragging = true;
    dragStartY = e.clientY;
    dragStartScroll = scrollPos;
    pauseScroll();
});

document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const delta = e.clientY - dragStartY;
    scrollPos = dragStartScroll - delta;
    viewerContent.style.transform = `translateY(-${scrollPos}px)`;
});

document.addEventListener('mouseup', () => {
    isDragging = false;
});

viewerContent.addEventListener('touchstart', e => {
    isDragging = true;
    dragStartY = e.touches[0].clientY;
    dragStartScroll = scrollPos;
    pauseScroll();
});

document.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const delta = e.touches[0].clientY - dragStartY;
    scrollPos = dragStartScroll - delta;
    viewerContent.style.transform = `translateY(-${scrollPos}px)`;
});

document.addEventListener('touchend', () => {
    isDragging = false;
});

/* BUTTON EVENTS */

startBtn.onclick = startScroll;
pauseBtn.onclick = pauseScroll;
resetBtn.onclick = () => resetScroll();
nextSongBtn.onclick = nextSong;
prevSongBtn.onclick = prevSong;

/* KEYBOARD */

document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
        e.preventDefault();
        isRunning ? pauseScroll() : startScroll();
    }
    if (e.code === 'ArrowRight') nextSong();
    if (e.code === 'ArrowLeft') prevSong();
    if (e.code === 'KeyR') resetScroll();
});

/* INIT */

loadSongs();

if (!playlistSongs.length) {
    viewerContent.innerHTML = `
        <span class="viewer-content-line">
            No playlist selected.
            Open playlist page and choose a song.
        </span>
    `;
}
</script>

</body>
</html>
