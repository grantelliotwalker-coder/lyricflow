<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>LyricFlow</title>
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

<style>
/* =========================
   ORIGINAL STYLING — UNCHANGED
   ========================= */

:root {
    --bg: #070b10;
    --card: #111827;
    --accent: #22c55e;
    --accent-bright: #22c55e;
    --text-main: #e5e7eb;
    --text-soft: #9ca3af;
    --text-muted: #6b7280;
    --shadow-soft: 0 18px 60px rgba(15, 23, 42, 0.85);
}

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: radial-gradient(circle at top, #020617 0%, #020617 48%, #000 100%);
    color: var(--text-main);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    overflow: hidden;
}

body {
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 14px;
}

.app-shell {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 1080px;
    margin: 0 auto;
    padding: 14px 14px 10px;
    border-radius: 30px;
    background: linear-gradient(145deg, #020617 0%, #020617 100%);
    border: 1px solid rgba(148, 163, 184, 0.28);
    box-shadow: var(--shadow-soft);
    position: relative;
    overflow: hidden;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.branding {
    display: flex;
    gap: 10px;
    align-items: center;
}

.app-title {
    font-size: 16px;
    font-weight: 600;
}

.viewer-card {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

.viewer {
    position: relative;
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    font-size: 20px;
    line-height: 1.9;
    text-align: center;
    white-space: pre-wrap;
    cursor: grab;
}

.viewer-content {
    display: inline-block;
    transform: translateY(0px);
}

.viewer-content-line {
    display: block;
    padding: 2px 0;
}

.hidden { display: none !important; }

.transport {
    display: flex;
    gap: 10px;
    justify-content: center;
}

button {
    background: #111827;
    border: 1px solid #374151;
    color: white;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
}
button:hover { border-color: var(--accent-bright); }

.playlist-pill {
    font-size: 12px;
    color: var(--text-soft);
}
</style>
</head>

<body>

<button onclick="window.location.href='playlist.html'"
        style="position:absolute; top:10px; right:10px; z-index:1000;">
  Playlist
</button>

<div class="app-shell">

<header class="header">
    <div class="branding">
        <div class="app-title">LyricFlow</div>
    </div>
    <div class="playlist-pill" id="playlistPill"></div>
</header>

<div class="viewer-card">
    <div class="viewer" id="viewer">
        <div class="viewer-content" id="viewerContent">
            <span class="viewer-content-line">
                Welcome to LyricFlow – stage-ready lyric scroller.
            </span>
        </div>
    </div>
</div>

<div class="transport">
    <button id="prevSongBtn">Prev</button>
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
    <button id="nextSongBtn">Next</button>
</div>

</div>

<script>

/* =========================
   ORIGINAL SCROLL ENGINE (UNTOUCHED CORE LOGIC)
   ========================= */

const viewer = document.getElementById("viewer");
const viewerContent = document.getElementById("viewerContent");

let isScrolling = false;
let scrollSpeed = 0.5;
let animationFrame = null;
let baseContentY = 0;

function applyScroll() {
    viewerContent.style.transform = "translateY(" + baseContentY + "px)";
}

function step() {
    if (!isScrolling) return;
    baseContentY -= scrollSpeed;
    applyScroll();
    animationFrame = requestAnimationFrame(step);
}

function startScroll() {
    if (isScrolling) return;
    isScrolling = true;
    step();
}

function pauseScroll() {
    isScrolling = false;
    cancelAnimationFrame(animationFrame);
}

function resetScroll() {
    pauseScroll();
    baseContentY = 0;
    applyScroll();
}

/* =========================
   STORAGE + PLAYLIST BRIDGE
   ========================= */

const STORAGE_KEY = "lyricflow_v3_songs";

function loadCurrentSongFromStorage() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;

    const songs = JSON.parse(raw);
    const currentSongId = localStorage.getItem("lyricflow_currentSongId");
    if (!currentSongId) return;

    const song = songs.find(s => s.id === currentSongId);
    if (!song) return;

    loadSongIntoViewer(song);
}

function loadSongIntoViewer(song) {
    viewerContent.innerHTML = "";
    song.content.split("\n").forEach(line => {
        const span = document.createElement("span");
        span.className = "viewer-content-line";
        span.textContent = line;
        viewerContent.appendChild(span);
    });

    document.getElementById("playlistPill").textContent =
        song.playlist + " · " + song.name;

    resetScroll();
}

/* =========================
   PLAYLIST NAVIGATION
   ========================= */

function navigate(offset) {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const songs = JSON.parse(raw);

    const currentSongId = localStorage.getItem("lyricflow_currentSongId");
    if (!currentSongId) return;

    const index = songs.findIndex(s => s.id === currentSongId);
    if (index === -1) return;

    let nextIndex = index + offset;
    if (nextIndex < 0) nextIndex = songs.length - 1;
    if (nextIndex >= songs.length) nextIndex = 0;

    const nextSong = songs[nextIndex];
    localStorage.setItem("lyricflow_currentSongId", nextSong.id);
    loadSongIntoViewer(nextSong);
}

/* =========================
   BUTTON HOOKS
   ========================= */

document.getElementById("startBtn").onclick = startScroll;
document.getElementById("pauseBtn").onclick = pauseScroll;
document.getElementById("resetBtn").onclick = resetScroll;
document.getElementById("prevSongBtn").onclick = () => navigate(-1);
document.getElementById("nextSongBtn").onclick = () => navigate(1);

document.addEventListener("DOMContentLoaded", loadCurrentSongFromStorage);

</script>
</body>
</html>
